<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Components</title>
</head>
<body>
  <h1>Web Components  Test</h1>

  <section id="components-root"></section>

  <script>
    const onLoad = (evt) => {
      const componentName = evt.currentTarget.dataset.name;
      const componentElement = document.createElement(componentName);
      const options = [
        { value: 'opt1', text: 'Option 1' },
        { value: 'opt2', text: 'Option 2' },
        { value: 'opt3', text: 'Option 3' },
      ];

      componentElement.innerHTML = options
        .map((option) => `<option value="${option.value}">${option.text}</option>`)
        .join('');

      document.getElementById('components-root').append(componentElement);
    };

    const onError = (err) => {
      console.error('Component script loading error:', err);
    };

    const components = ['my-select'];

    components.forEach((component) => {
      const script = document.createElement('script');
      script.src = `./${component}.js`;
      script.dataset.name = component;
      script.addEventListener('load', onLoad);
      script.addEventListener('error', onError);
      document.body.append(script);
    });
  </script>
</body>
</html>
