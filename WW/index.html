<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Worker Experiment</title>
  <style>
    @keyframes spinner {
      0% {
        transform: scale(.1) rotate(0deg);
        fill: currentColor;
      }
      33% {
        transform: scale(1) rotate(150deg);
        fill: transparent;
      }
      66% {
        transform: scale(1) rotate(210deg);
        fill: transparent;
      }
      100% {
        transform: scale(.1) rotate(360deg);
        fill: currentColor;
      }
    }

    body {
      font-family: Arial, sans-serif;
      padding: 16px;
    }

    .spinner {
      animation: spinner 1.5s infinite linear;
      color: rgb(6, 75, 67);
      visibility: hidden;
    }

    .spinner.active {
      visibility: visible;
    }

    #result {
      margin-top: 12px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <button id="start">Start!</button>
  <div>
    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="56" fill="none" class="spinner" id="spinner">
      <path stroke="currentColor" stroke-width="4" d="M3.464 30a4 4 0 0 1 0-4L16 4.287a4 4 0 0 1 3.464-2h25.072a4 4 0 0 1 3.464 2L60.536 26a4 4 0 0 1 0 4L48 51.713a4 4 0 0 1-3.464 2H19.464a4 4 0 0 1-3.464-2L3.464 30Z"/>
    </svg>
  </div>
  <div id="result"></div>

  <script>
    const resultElement = document.getElementById('result');
    const spinner = document.getElementById('spinner');
    let thread = null;

    document.getElementById('start').addEventListener('click', () => {
      if (window.Worker) {
        spinner.classList.add('active');
        resultElement.textContent = 'Running...';

        if (!thread) {
          thread = new Worker('./WW/thread.js');


          thread.onmessage = (evt) => {
            const data = evt.data;
            resultElement.textContent =
              `Done in ${data.spentMs} ms; iterations: ${data.iterations}; x: ${data.x}`;
            spinner.classList.remove('active');
          };

          thread.onerror = () => {
            resultElement.textContent = 'Worker error';
            spinner.classList.remove('active');
            thread.terminate();
            thread = null;
          };
        }

        const timeout = 2000 + Math.floor(Math.random() * 3001); // 2000..5000 ms

        thread.postMessage({ timeout });
      } else {
        resultElement.textContent = 'Web Worker is not supported';
      }
    });

    window.addEventListener('beforeunload', () => {
      if (thread) {
        thread.terminate();
        thread = null;
      }
    });
  </script>
</body>
</html>
