<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Components</title>
</head>
<body>
  <h1>Web Components  Test</h1>

  <section id="components-root"></section>

  <script>
    const components = ['my-panel', 'my-select'];
    const loadedComponents = new Set();
    let isRendered = false;

    const renderComponents = () => {
      if (isRendered) {
        return;
      }

      const root = document.getElementById('components-root');
      const panel = document.createElement('my-panel');
      panel.dataset.header = 'Advanced Panel';
      panel.setAttribute('panel-subtitle', 'Custom Select in slot content');

      const select = document.createElement('my-select');
      const options = [
        { value: 'opt1', text: 'Option 1' },
        { value: 'opt2', text: 'Option 2' },
        { value: 'opt3', text: 'Option 3' },
        { value: 'opt4', text: 'Option 4' },
      ];

      select.innerHTML = `
        <div slot="search">
          <input class="light-find-box" placeholder="Поиск..." />
        </div>
        ${options.map((option) => `<option value="${option.value}">${option.text}</option>`).join('')}
      `;

      panel.append(select);
      root.replaceChildren(panel);
      isRendered = true;
    };

    const onLoad = (evt) => {
      const componentName = evt.currentTarget.dataset.name;
      loadedComponents.add(componentName);
      if (loadedComponents.size === components.length) {
        renderComponents();
      }
    };

    const onError = (err) => {
      console.error('Component script loading error:', err);
    };

    components.forEach((component) => {
      const script = document.createElement('script');
      script.src = `./${component}.js`;
      script.dataset.name = component;
      script.addEventListener('load', onLoad);
      script.addEventListener('error', onError);
      document.body.append(script);
    });
  </script>
</body>
</html>
